<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact — YourName</title>
  <meta name="description" content="Get in touch with YourName. Email, institution, and academic profile links." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>

  <!-- Navbar (injected by JS) -->
  <div id="navbar-placeholder"></div>


  <!-- =============================================================
       PAGE HEADER
       ============================================================= -->
  <header class="page-header">
    <div class="container">
      <h1>Get in <span>Touch</span></h1>
      <p>I'd love to hear from you — whether it's about research, collaboration, or just to say hi.</p>
    </div>
  </header>


  <!-- =============================================================
       CONTACT INFORMATION
       ============================================================= -->
  <section class="section">
    <div class="container">

      <!-- Two-column grid: Email + Institution -->
      <div class="contact__grid fade-in">

        <!-- Email card -->
        <div class="contact-card">
          <div class="contact-card__icon">
            <!-- Mail icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
          </div>
          <h3>Email</h3>
          <a href="mailto:your.email@university.edu">your.email@university.edu</a>
        </div>

        <!-- Institution card -->
        <div class="contact-card">
          <div class="contact-card__icon">
            <!-- Building icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="2" width="16" height="20" rx="2" />
              <path d="M9 22v-4h6v4" />
              <path d="M8 6h.01" />
              <path d="M16 6h.01" />
              <path d="M12 6h.01" />
              <path d="M12 10h.01" />
              <path d="M12 14h.01" />
              <path d="M16 10h.01" />
              <path d="M16 14h.01" />
              <path d="M8 10h.01" />
              <path d="M8 14h.01" />
            </svg>
          </div>
          <h3>Institution</h3>
          <p>Department of Something</p>
          <p>Your University</p>
          <p>City, Country</p>
        </div>

      </div>

      <!-- Academic / social profile links -->
      <div class="social-links fade-in">

        <a href="https://scholar.google.com" target="_blank" rel="noopener" class="social-link">
          <!-- Scholar icon (book) -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
          </svg>
          Google Scholar
        </a>

        <a href="https://orcid.org" target="_blank" rel="noopener" class="social-link">
          <!-- ORCID icon (user-circle) -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="10" r="3" />
            <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662" />
          </svg>
          ORCID
        </a>

        <a href="https://github.com" target="_blank" rel="noopener" class="social-link">
          <!-- GitHub icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
          </svg>
          GitHub
        </a>

        <a href="https://linkedin.com" target="_blank" rel="noopener" class="social-link">
          <!-- LinkedIn icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
            <rect x="2" y="9" width="4" height="12" />
            <circle cx="4" cy="4" r="2" />
          </svg>
          LinkedIn
        </a>

      </div>

    </div>
  </section>


  <!-- Footer (injected by JS) -->
  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
