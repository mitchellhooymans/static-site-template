  <link rel="stylesheet" href="css/main.css" />

<body>

  <!-- Navbar (injected by JS) -->

  <!-- =============================================================
       PAGE HEADER
       ============================================================= -->

    <div class="container">

    </div>

  <!-- =============================================================
       ABOUT CONTENT
       ============================================================= -->

      <div class="about__grid fade-in">

        <!-- Profile photo -->

        <div class="about__body" id="about-content" data-src="content/about.md">
          <!-- Loaded via markdown.js -->
        </div>

      </div>
    </div>

    <!-- Education (injected by JS from about.md)
    <div class="container fade-in" id="about-education" style="margin-top: var(--space-3xl);">
    </div> -->
  </section>


  <!-- Footer (injected by JS) -->
  <div id="footer-placeholder"></div>

  <!-- marked.js from CDN — lightweight markdown parser -->

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/markdown.js"></script>
